name: Deploy Lambda

on:
  push:
    branches:
      - main

concurrency:
  group: lambda-deploy
  cancel-in-progress: true

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker Image
      run: docker build -t lambda-image .

    - name: Tag Docker Image
      run: |
        docker tag lambda-image:latest \
        ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Push Image to ECR
      run: |
        docker push ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve -var="image_uri=${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"