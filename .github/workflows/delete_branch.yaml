  delete_branch:

    needs: deploy

    runs-on: ubuntu-latest

    steps:

    - name: Delete merged branch
      uses: actions/github-script@v7
      with:
        script: |
          const branch = context.payload.head_ref;
          if(branch){
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`
            })
          }